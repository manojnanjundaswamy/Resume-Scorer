# ── Server ────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=resumescorer-backend

# ── Database ──────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/resumescorer}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ── JWT ───────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_LONG_RANDOM_STRING_AT_LEAST_256_BITS}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── AI Provider ───────────────────────────────────────────
# Options: CLAUDE | GEMINI | OPENAI | OPENROUTER
app.ai.active-provider=${ACTIVE_AI_PROVIDER:CLAUDE}

# Claude (Anthropic)
app.ai.claude.api-key=${ANTHROPIC_API_KEY:}
# app.ai.claude.model=${CLAUDE_MODEL:claude-sonnet-4-6}
app.ai.claude.model=${CLAUDE_MODEL:claude-haiku-4-5}
app.ai.claude.base-url=https://api.anthropic.com

# Gemini (Google)
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-1.5-pro}

# OpenAI
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.model=${OPENAI_MODEL:gpt-4o}

# OpenRouter
app.ai.openrouter.api-key=${OPENROUTER_API_KEY:}
app.ai.openrouter.model=${OPENROUTER_MODEL:anthropic/claude-3.5-sonnet}
app.ai.openrouter.base-url=https://openrouter.ai/api/v1

# ── AWS S3 / MinIO ────────────────────────────────────────
app.aws.region=${AWS_REGION:us-east-1}
app.aws.s3.bucket=${S3_BUCKET_NAME:resumescorer-files}
app.aws.access-key=${AWS_ACCESS_KEY_ID:}
app.aws.secret-key=${AWS_SECRET_ACCESS_KEY:}
# Leave blank for real AWS; set to http://localhost:9000 for MinIO
app.aws.endpoint=${S3_ENDPOINT:}

# ── Google OAuth ──────────────────────────────────────────
app.google.client-id=${GOOGLE_CLIENT_ID:}

# ── Credits ───────────────────────────────────────────────
app.credits.new-user-free-credits=${NEW_USER_FREE_CREDITS:3}
app.credits.cost-per-analysis=${CREDITS_PER_ANALYSIS:1}

# ── Razorpay Payment ─────────────────────────────────────
app.payment.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# ── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────
logging.level.com.resumescorer=DEBUG
logging.level.org.springframework.security=WARN
