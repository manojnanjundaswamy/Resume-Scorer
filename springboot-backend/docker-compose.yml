# ── Local full-stack dev environment ─────────────────────────────────────────
# For local dev, run ONLY the infrastructure (postgres + minio):
#   docker compose up postgres minio -d
#
# Then run the Spring Boot API separately (easier for dev/debugging):
#   .\mvnw.cmd spring-boot:run
#
# To run everything in Docker (CI / staging):
#   docker compose --profile full up --build

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resumescorer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       resumescorer
      POSTGRES_USER:     resumescorer
      POSTGRES_PASSWORD: resumescorer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resumescorer"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (local S3-compatible storage) ────────────────────────────────────
  # Bucket is auto-created by Spring Boot on startup (see BucketInitializer.java)
  # MinIO web console: http://localhost:9001  login: minioadmin / minioadmin
  minio:
    image: minio/minio:latest
    container_name: resumescorer_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot API (full Docker mode — use --profile full) ────────────────
  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumescorer_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL:      jdbc:postgresql://postgres:5432/resumescorer
      DATABASE_USERNAME: resumescorer
      DATABASE_PASSWORD: resumescorer_dev

      JWT_SECRET:        ${JWT_SECRET:-dev_jwt_secret_change_in_production_32chars_min}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      ACTIVE_AI_PROVIDER: ${ACTIVE_AI_PROVIDER:-CLAUDE}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY:     ${GEMINI_API_KEY:-}
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      S3_ENDPOINT:           http://minio:9000
      AWS_REGION:            us-east-1
      AWS_ACCESS_KEY_ID:     minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME:        resumescorer-files

      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID:-}
      CORS_ALLOWED_ORIGINS:  ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      NEW_USER_FREE_CREDITS: ${NEW_USER_FREE_CREDITS:-3}

    env_file:
      - path: .env
        required: false

volumes:
  postgres_data:
  minio_data:
